server {
    listen $PORT;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Correct MIME types for modern web
    types {
        text/html                     html htm;
        text/css                      css;
        application/javascript        js mjs;
        application/json              json;
        image/svg+xml                 svg;
        image/png                     png;
        image/jpeg                    jpg jpeg;
        image/webp                    webp;
        image/x-icon                  ico;
        application/manifest+json     webmanifest;
        text/plain                    txt;
        audio/webm                    webm;
        audio/mpeg                    mp3;
    }

    # Cache static assets
    location ~* \.(js|mjs|css|png|jpg|jpeg|svg|ico|webp)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # No-cache for JSON (stories may update)
    location ~* \.json$ {
        expires -1;
        add_header Cache-Control "no-cache";
    }

    # Service worker must not be cached
    location = /sw.js {
        expires -1;
        add_header Cache-Control "no-cache";
    }

    # Serve index.html for everything else
    location / {
        try_files $uri $uri/ /index.html;
    }
}
