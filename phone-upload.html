<!DOCTYPE html>
<html lang="zh-Hans-SG">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Upload Exam Paper</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fffaf2; color: #2b2b2b;
      min-height: 100dvh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px env(safe-area-inset-right, 0) 24px env(safe-area-inset-left, 0);
    }
    .card {
      background: #fff; border-radius: 16px; padding: 32px 24px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10); width: 100%; max-width: 400px;
      display: flex; flex-direction: column; gap: 20px; align-items: center; text-align: center;
    }
    h1 { font-size: 1.25rem; font-weight: 700; }
    p.hint { font-size: 0.9rem; color: #6b6b6b; line-height: 1.5; }
    .upload-btn {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      background: #e8590c; color: #fff; border: none; border-radius: 12px;
      padding: 20px 32px; font-size: 1rem; font-weight: 600; cursor: pointer;
      width: 100%; touch-action: manipulation;
    }
    .upload-btn span.icon { font-size: 2rem; }
    .file-row {
      display: flex; flex-direction: column; gap: 12px; width: 100%;
    }
    .secondary-btn {
      background: #f4f0eb; color: #2b2b2b; border: none; border-radius: 12px;
      padding: 16px 24px; font-size: 0.95rem; font-weight: 500; cursor: pointer;
      width: 100%; touch-action: manipulation;
    }
    #preview-list {
      display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
    }
    #preview-list img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; }
    .status { font-size: 0.95rem; color: #6b6b6b; }
    .status.success { color: #2f9e44; font-weight: 600; font-size: 1rem; }
    .status.error { color: #c92a2a; }
    #done-btn {
      background: #2f9e44; color: #fff; border: none; border-radius: 12px;
      padding: 16px 24px; font-size: 1rem; font-weight: 600; cursor: pointer;
      width: 100%; touch-action: manipulation;
    }
    [hidden] { display: none !important; }
  </style>
</head>
<body>
  <div class="card">
    <h1>📷 Upload Exam Paper</h1>
    <p class="hint" id="hint">Take photos of the exam paper(s). You can add multiple pages — AI will split them into separate exams.</p>

    <div class="file-row" id="upload-section">
      <label class="upload-btn">
        <span class="icon">📷</span>
        Take Photo
        <input type="file" accept="image/*" capture="environment" hidden id="cam-input">
      </label>
      <label class="secondary-btn">
        Choose from Library
        <input type="file" accept="image/*" multiple hidden id="lib-input">
      </label>
    </div>

    <div id="preview-list"></div>

    <p id="status" class="status" hidden></p>
    <button id="done-btn" hidden>Send to App ✓</button>
    <p id="success-msg" class="status success" hidden>✓ Uploaded! You can close this page.</p>
  </div>

  <script>
    const token = new URLSearchParams(location.search).get('token');
    if (!token) document.querySelector('.card').innerHTML = '<p style="color:#c92a2a">Invalid link. Please scan the QR code again.</p>';

    const pending = []; // File objects
    const previewList = document.getElementById('preview-list');
    const doneBtn = document.getElementById('done-btn');
    const statusEl = document.getElementById('status');

    function addFiles(files) {
      for (const f of files) {
        if (!f.type.startsWith('image/')) continue;
        pending.push(f);
        const img = document.createElement('img');
        img.src = URL.createObjectURL(f);
        previewList.appendChild(img);
      }
      if (pending.length > 0) {
        doneBtn.hidden = false;
        document.getElementById('hint').textContent = `${pending.length} photo${pending.length > 1 ? 's' : ''} selected. Add more or tap Send.`;
      }
    }

    document.getElementById('cam-input').addEventListener('change', e => addFiles(e.target.files));
    document.getElementById('lib-input').addEventListener('change', e => addFiles(e.target.files));

    doneBtn.addEventListener('click', async () => {
      if (!pending.length) return;
      doneBtn.disabled = true;
      statusEl.textContent = 'Uploading…';
      statusEl.className = 'status';
      statusEl.hidden = false;

      const form = new FormData();
      for (const f of pending) form.append('files', f);

      try {
        const res = await fetch(`/api/tingxie/upload-session/${token}`, { method: 'POST', body: form });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || `Upload failed (${res.status})`);
        }
        document.getElementById('upload-section').hidden = true;
        previewList.hidden = true;
        doneBtn.hidden = true;
        statusEl.hidden = true;
        document.getElementById('success-msg').hidden = false;
        document.getElementById('hint').textContent = 'You can close this page now.';
      } catch (e) {
        statusEl.textContent = e.message;
        statusEl.className = 'status error';
        doneBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
